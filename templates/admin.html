<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Além da Fé</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#e8c46a">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/icon-152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/static/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/static/icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Além da Fé">
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Montserrat',sans-serif;background:#05080f;color:#f0ead8;min-height:100vh;padding:40px 20px}
        .container{max-width:600px;margin:0 auto}
        h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:#f0ead8;margin-bottom:4px}
        h1 em{font-style:italic;color:#e8c46a}
        .sub{font-size:10px;color:rgba(240,234,216,0.3);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
        .card{background:linear-gradient(160deg,#0e1420,#111827);border:1px solid rgba(201,150,58,0.15);padding:24px;margin-bottom:12px;position:relative}
        .card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(to right,transparent,rgba(201,150,58,0.5),transparent)}
        table{width:100%;border-collapse:collapse}
        th{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(201,150,58,0.6);padding:10px 12px;text-align:left;border-bottom:1px solid rgba(201,150,58,0.1)}
        td{font-size:12px;color:rgba(240,234,216,0.7);padding:12px;border-bottom:1px solid rgba(255,255,255,0.04)}
        .badge{display:inline-block;padding:3px 10px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
        .badge-free{background:rgba(255,255,255,0.06);color:rgba(240,234,216,0.4)}
        .badge-premium{background:rgba(201,150,58,0.15);color:#e8c46a;border:1px solid rgba(201,150,58,0.3)}
        .btn-upgrade{padding:6px 14px;background:linear-gradient(135deg,#c9963a,#e8c46a);color:#05080f;border:none;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.2s}
        .btn-upgrade:hover{opacity:.85}
        .btn-downgrade{padding:6px 14px;background:transparent;border:1px solid rgba(240,234,216,0.15);color:rgba(240,234,216,0.35);font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
        .btn-delete{padding:6px 14px;background:transparent;border:1px solid rgba(180,50,50,0.4);color:rgba(255,120,120,0.7);font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-left:6px;transition:.2s}
        .btn-delete:hover{background:rgba(180,50,50,0.15);color:#ff9090}
        .msg{padding:10px 14px;font-size:11px;margin-bottom:16px;display:none}
        .msg.ok{background:rgba(50,180,50,0.1);border:1px solid rgba(50,180,50,0.3);color:#90ff90}
        .msg.err{background:rgba(180,50,50,0.1);border:1px solid rgba(180,50,50,0.3);color:#ff9090}
    </style>
</head>
<body>
<div class="container">
    <h1>Além da <em>Fé</em></h1>
    <div class="sub">Painel Administrativo</div>

    <div class="msg" id="msg"></div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Telefone</th>
                    <th>Plano</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>
</div>

<script>
async function carregar() {
    const r = await fetch('/admin/usuarios');
    const usuarios = await r.json();
    const tbody = document.getElementById('lista');
    tbody.innerHTML = '';
    usuarios.forEach(u => {
        tbody.innerHTML += `
        <tr>
            <td>${u.nome}</td>
            <td>${u.email}</td>
            <td>${u.telefone || '—'}</td>
            <td><span class="badge ${u.plano === 'premium' ? 'badge-premium' : 'badge-free'}">${u.plano}</span></td>
            <td>
                ${u.plano !== 'premium'
                    ? `<button class="btn-upgrade" onclick="mudarPlano(${u.id},'premium')">Liberar Premium</button>`
                    : `<button class="btn-downgrade" onclick="mudarPlano(${u.id},'gratuito')">Revogar</button>`
                }
                <button class="btn-delete" onclick="excluirUsuario(${u.id}, '${u.nome}')">Excluir</button>
            </td>
        </tr>`;
    });
}

async function mudarPlano(id, plano) {
    const r = await fetch('/admin/mudar-plano', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id, plano})
    });
    const d = await r.json();
    const msg = document.getElementById('msg');
    msg.textContent = d.ok ? 'Plano atualizado com sucesso!' : 'Erro: ' + d.erro;
    msg.className = 'msg ' + (d.ok ? 'ok' : 'err');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
    if (d.ok) carregar();
}

async function excluirUsuario(id, nome) {
    if (!confirm(`Excluir o usuário "${nome}"?\n\nEsta ação remove o usuário, mensagens e assinaturas de push permanentemente.`)) return;
    const r = await fetch('/admin/excluir-usuario', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id})
    });
    const d = await r.json();
    const msg = document.getElementById('msg');
    msg.textContent = d.ok ? 'Usuário excluído com sucesso.' : 'Erro: ' + d.erro;
    msg.className = 'msg ' + (d.ok ? 'ok' : 'err');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
    if (d.ok) carregar();
}

carregar();
</script>
</body>
</html>
