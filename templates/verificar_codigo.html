<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Além da Fé — Verificar Código</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#e8c46a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Montserrat',sans-serif;background:#05080f;color:#f0ead8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
        .topo{text-align:center;margin-bottom:32px}
        .topo h1{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,7vw,38px);font-weight:300;color:#f0ead8;letter-spacing:1px}
        .topo h1 em{font-style:italic;color:#e8c46a;text-shadow:0 0 30px rgba(232,196,106,0.5)}
        .topo p{font-size:11px;color:rgba(240,234,216,0.45);margin-top:8px;line-height:1.8}
        .card{width:100%;max-width:400px;background:linear-gradient(160deg,#0e1420,#111827);border:1px solid rgba(201,150,58,0.15);padding:32px 28px;position:relative}
        .card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(to right,transparent,rgba(201,150,58,0.6),transparent)}
        .field{margin-bottom:20px}
        .field label{display:block;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(201,150,58,0.65);margin-bottom:8px}
        .field input{width:100%;background:rgba(5,8,15,0.7);border:1px solid rgba(201,150,58,0.2);color:#f0ead8;padding:16px;font-family:'Montserrat',sans-serif;font-size:28px;font-weight:700;outline:none;transition:.2s;text-align:center;letter-spacing:8px}
        .field input:focus{border-color:rgba(201,150,58,0.7)}
        .field input::placeholder{font-size:14px;letter-spacing:2px;font-weight:300;color:rgba(240,234,216,0.2)}
        .btn{width:100%;padding:15px;background:linear-gradient(135deg,#c9963a,#e8c46a);color:#05080f;border:none;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:.2s}
        .btn:hover{opacity:.85}
        .erro{background:rgba(180,50,50,0.15);border:1px solid rgba(180,50,50,0.3);color:#ff9090;font-size:11px;padding:10px 14px;margin-bottom:16px;display:none;line-height:1.5}
        .voltar{text-align:center;margin-top:16px}
        .voltar a{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(240,234,216,0.3);text-decoration:none;transition:.2s}
        .voltar a:hover{color:#e8c46a}
    </style>
</head>
<body>
<div class="topo">
    <h1>Além da <em>Fé</em></h1>
    <p>Digite o código de 6 dígitos enviado para seu email.<br>Válido por 15 minutos.</p>
</div>
<div class="card">
    <div class="erro" id="erro"></div>
    <div class="field">
        <label>Código de verificação</label>
        <input type="text" id="codigo" placeholder="000000" maxlength="6" inputmode="numeric" onkeydown="if(event.key==='Enter') verificar()">
    </div>
    <button class="btn" onclick="verificar()">Verificar código</button>
</div>
<div class="voltar"><a href="/esqueci-senha">← Reenviar código</a></div>

<script>
async function verificar() {
    document.getElementById('erro').style.display = 'none';
    const codigo = document.getElementById('codigo').value.trim();
    if (codigo.length !== 6) { document.getElementById('erro').textContent = 'Digite os 6 dígitos do código.'; document.getElementById('erro').style.display = 'block'; return; }
    const r = await fetch('/verificar-codigo', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({codigo}) });
    const d = await r.json();
    if (d.ok) { window.location.href = '/nova-senha'; }
    else { document.getElementById('erro').textContent = d.erro; document.getElementById('erro').style.display = 'block'; }
}
</script>
</body>
</html>
